<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ハワイアンズ準備" />
  <title>ハワイアンズ準備チェック</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Family Checklist</p>
      <h1>🏝 ハワイアンズ準備</h1>
      <p class="subtitle">家族3人・1泊2日・プール旅行</p>
    </div>
    <button id="themeToggle" class="icon-button" aria-label="ダークモード切替">🌙</button>
  </header>

  <main>
    <section class="summary-card">
      <div class="summary-top">
        <div>
          <p class="summary-label">準備率</p>
          <strong id="progressText">0%</strong>
        </div>
        <button id="shareButton" class="share-button">LINE共有文を作る</button>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
      <p id="countText" class="count-text">0 / 0 完了</p>
    </section>

    <nav class="tabs" aria-label="カテゴリ">
      <button class="tab active" data-filter="all">全部</button>
      <button class="tab" data-filter="papa">👨 パパ</button>
      <button class="tab" data-filter="mama">👩 ママ</button>
      <button class="tab" data-filter="kid">👦 子ども</button>
      <button class="tab" data-filter="pool">🏊 プール</button>
      <button class="tab" data-filter="car">🚗 車</button>
    </nav>

    <section id="list" class="list" aria-live="polite"></section>

    <section class="add-card">
      <h2>項目を追加</h2>
      <div class="add-row">
        <input id="newItemInput" type="text" placeholder="例：子どもの帽子" />
        <select id="categorySelect">
          <option value="papa">👨 パパ</option>
          <option value="mama">👩 ママ</option>
          <option value="kid">👦 子ども</option>
          <option value="pool">🏊 プール</option>
          <option value="car">🚗 車</option>
        </select>
        <button id="addButton">追加</button>
      </div>
    </section>

    <section class="memo-card">
      <h2>メモ</h2>
      <textarea id="memo" placeholder="集合時間、ホテル、駐車場メモなど"></textarea>
    </section>
  </main>

  <footer>
    <button id="resetButton" class="danger">チェックをリセット</button>
    <p>ホーム画面に追加するとアプリのように使えます。</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
